name: 🔔 PU Notification Bot

on:
  schedule:
    # Runs every 15 minutes (GitHub Actions minimum)
    - cron: '*/15 * * * *'

  # Allows manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_reseed:
        description: 'Clear seen.json and re-seed (no alerts sent)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write   # needed to commit seen.json back to repo

jobs:
  check-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pull latest (another run may have updated seen.json)
          fetch-depth: 1

      # ── 2. Re-seed if requested ───────────────────────────────
      - name: 🔄 Clear seen.json (if force_reseed)
        if: ${{ github.event.inputs.force_reseed == 'true' }}
        run: rm -f seen.json && echo "{}" > seen.json

      # ── 3. Python ────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run scraper ───────────────────────────────────────
      - name: 🤖 Check for new notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      # ── 5. Commit updated seen.json ──────────────────────────
      - name: 💾 Commit seen.json
        run: |
          git config user.name  "pu-notif-bot[bot]"
          git config user.email "pu-notif-bot@users.noreply.github.com"
          git add seen.json
          # Only commit if something changed
          if git diff --cached --quiet; then
            echo "No changes to seen.json — skipping commit."
          else
            git pull --rebase origin main
            git commit -m "chore: update seen.json [skip ci]"
            git push
          fi
